<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2332"/>
      <stop offset="1" stop-color="#0F1720"/>
    </linearGradient>
    <filter id="glowOrange" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTeal" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Divider lines -->
  <rect x="338" y="40" width="1.5" height="944" fill="#2A3A4C" opacity="0.5"/>
  <rect x="685" y="40" width="1.5" height="944" fill="#2A3A4C" opacity="0.5"/>

  <!-- === Pane 1 (left) === -->
  <g filter="url(#glowOrange)">
    <path d="M100 360 L160 420 L100 480" stroke="#F0883E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="182" y="462" width="52" height="14" rx="7" fill="#F0883E"/>
  </g>
  <rect x="100" y="540" width="180" height="10" rx="5" fill="#F0883E" opacity="0.13"/>
  <rect x="100" y="574" width="200" height="10" rx="5" fill="#F0883E" opacity="0.10"/>
  <rect x="100" y="608" width="140" height="10" rx="5" fill="#F0883E" opacity="0.07"/>

  <!-- === Pane 2 (middle) === -->
  <g filter="url(#glowTeal)">
    <path d="M398 360 L458 420 L398 480" stroke="#56D4C4" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="480" y="462" width="52" height="14" rx="7" fill="#56D4C4"/>
  </g>
  <rect x="398" y="540" width="240" height="10" rx="5" fill="#56D4C4" opacity="0.13"/>
  <rect x="398" y="574" width="170" height="10" rx="5" fill="#56D4C4" opacity="0.10"/>
  <rect x="398" y="608" width="220" height="10" rx="5" fill="#56D4C4" opacity="0.07"/>
  <rect x="398" y="642" width="160" height="10" rx="5" fill="#56D4C4" opacity="0.06"/>

  <!-- === Pane 3 (right) === -->
  <g filter="url(#glowPurple)">
    <path d="M744 360 L804 420 L744 480" stroke="#A78BFA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="826" y="462" width="52" height="14" rx="7" fill="#A78BFA"/>
  </g>
  <rect x="744" y="540" width="190" height="10" rx="5" fill="#A78BFA" opacity="0.13"/>
  <rect x="744" y="574" width="150" height="10" rx="5" fill="#A78BFA" opacity="0.10"/>
  <rect x="744" y="608" width="200" height="10" rx="5" fill="#A78BFA" opacity="0.07"/>
</svg>

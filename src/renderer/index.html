<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>FlowDeck</title>
    <link rel="stylesheet" href="./styles.css" />
    <script>
      (function () {
        var prefersLight =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.setAttribute(
          'data-theme',
          prefersLight ? 'light' : 'dark',
        );
      })();
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="tabs-panel" aria-label="Pane tabs">
        <div class="tabs-list" id="tabs-list"></div>
        <div class="tabs-actions">
          <button class="tabs-add" id="tabs-add" type="button" aria-label="Add pane">+</button>
          <button class="tabs-settings" id="tabs-settings" type="button" aria-label="Open settings">&#9881;</button>
        </div>
        <section class="settings-panel is-hidden" id="settings-panel" aria-label="Settings">
          <label class="settings-row" for="theme-mode-input">
            <span>Theme</span>
          </label>
          <select class="settings-select" id="theme-mode-input">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>

          <label class="settings-row" for="font-size-input">
            <span>Font size</span>
          </label>
          <input class="settings-number" id="font-size-input" type="number" min="10" max="24" step="1" value="13" />

          <label class="settings-row" for="default-directory-input">
            <span>Default directory</span>
          </label>
          <input id="default-directory-input" type="text" value="~" spellcheck="false" />

          <label class="settings-row" for="max-sessions-input">
            <span>Max sessions</span>
          </label>
          <input class="settings-number" id="max-sessions-input" type="number" min="1" max="9" step="1" value="8" />

          <label class="settings-row" for="usage-provider-input">
            <span>Usage source</span>
          </label>
          <select class="settings-select" id="usage-provider-input">
            <option value="codex">Codex</option>
            <option value="claude-code">Claude Code</option>
          </select>

          <label class="settings-row" for="pane-width-range">
            <span>Pane width</span>
            <span id="pane-width-value">720px</span>
          </label>
          <div class="settings-dual">
            <input id="pane-width-range" type="range" min="520" max="1000" step="10" value="720" />
            <input class="settings-number" id="pane-width-input" type="number" min="520" max="1000" step="10" value="720" />
          </div>

          <label class="settings-row" for="pane-opacity-range">
            <span>Pane depth</span>
            <span id="pane-opacity-value">0.75</span>
          </label>
          <div class="settings-dual">
            <input id="pane-opacity-range" type="range" min="0.5" max="1" step="0.01" value="0.75" />
            <input class="settings-number" id="pane-opacity-input" type="number" min="0.5" max="1" step="0.01" value="0.75" />
          </div>
        </section>
      </header>

      <main class="stage-wrap">
        <section class="stage" id="stage" aria-label="Pane stage"></section>
      </main>

      <footer class="status-bar">
        <span id="status-label"></span>
        <span class="status-hint" id="status-hint"></span>
      </footer>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>

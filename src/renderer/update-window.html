<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowDeck Update</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #eef1f5;
        --bg-accent: rgba(0, 113, 227, 0.12);
        --surface-border: rgba(15, 23, 42, 0.08);
        --text: #17171a;
        --text-soft: #424245;
        --muted: #6e6e73;
        --track: rgba(15, 23, 42, 0.12);
        --fill-a: #0071e3;
        --fill-b: #45a1ff;
        --btn-bg: rgba(255, 255, 255, 0.8);
        --btn-bg-hover: rgba(255, 255, 255, 0.96);
        --btn-border: rgba(15, 23, 42, 0.12);
        --btn-border-hover: rgba(15, 23, 42, 0.2);
        --btn-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        --btn-text: #17171a;
        --primary-bg: #0071e3;
        --primary-bg-hover: #1488ff;
        --primary-text: #ffffff;
        --primary-shadow: 0 10px 24px rgba(0, 70, 180, 0.26);
        --icon-shadow: 0 14px 28px rgba(15, 23, 42, 0.14), 0 0 0 0.5px rgba(15, 23, 42, 0.08);
        --focus-ring: rgba(0, 113, 227, 0.24);
        --badge-bg: rgba(0, 113, 227, 0.12);
        --badge-text: #0057b8;
        --notes-divider: rgba(15, 23, 42, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131417;
          --bg-accent: rgba(90, 200, 250, 0.14);
          --surface-border: rgba(255, 255, 255, 0.08);
          --text: #f5f5f7;
          --text-soft: #d7d7dc;
          --muted: #97979f;
          --track: rgba(255, 255, 255, 0.16);
          --fill-a: #0a84ff;
          --fill-b: #5ac8fa;
          --btn-bg: rgba(255, 255, 255, 0.1);
          --btn-bg-hover: rgba(255, 255, 255, 0.16);
          --btn-border: rgba(255, 255, 255, 0.14);
          --btn-border-hover: rgba(255, 255, 255, 0.22);
          --btn-shadow: 0 12px 28px rgba(0, 0, 0, 0.34);
          --btn-text: #f5f5f7;
          --primary-bg: #0a84ff;
          --primary-bg-hover: #2494ff;
          --primary-shadow: 0 12px 26px rgba(0, 0, 0, 0.34);
          --icon-shadow: 0 16px 36px rgba(0, 0, 0, 0.42), 0 0 0 0.5px rgba(255, 255, 255, 0.1);
          --focus-ring: rgba(10, 132, 255, 0.38);
          --badge-bg: rgba(10, 132, 255, 0.18);
          --badge-text: #8dc1ff;
          --notes-divider: rgba(255, 255, 255, 0.08);
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background:
          radial-gradient(circle at top left, var(--bg-accent), transparent 34%),
          linear-gradient(180deg, color-mix(in srgb, var(--bg) 94%, white 6%), var(--bg));
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
        font-size: 13px;
        line-height: 1.42;
        -webkit-font-smoothing: antialiased;
      }

      body {
        min-height: 100%;
        padding: 22px 24px 18px;
        -webkit-app-region: drag;
        user-select: none;
      }

      body.is-compact {
        display: grid;
        align-content: center;
      }

      .panel {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 18px;
        min-height: 100%;
      }

      .card {
        display: grid;
        grid-template-columns: 56px minmax(0, 1fr);
        align-items: start;
        gap: 16px;
      }

      .icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--icon-shadow);
        align-self: start;
      }

      .icon svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-width: 0;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        min-height: 24px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 24px;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--badge-bg);
        color: var(--badge-text);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .badge.hidden,
      .notes-shell.hidden,
      .progress.is-hidden,
      .button.hidden {
        display: none;
      }

      .title {
        font-size: 17px;
        line-height: 1.24;
        font-weight: 650;
        letter-spacing: -0.015em;
      }

      .detail {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-soft);
        white-space: pre-wrap;
      }

      .detail.is-hidden {
        display: none;
      }

      .progress {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
        margin-top: 2px;
      }

      .progress-track {
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: var(--track);
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--fill-a) 0%, var(--fill-b) 100%);
        transition: width 160ms ease;
      }

      .progress-text {
        font-size: 11px;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .notes-shell {
        display: grid;
        gap: 10px;
        min-height: 0;
        margin-top: 4px;
        padding-top: 14px;
        border-top: 1px solid var(--notes-divider);
      }

      .notes-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .notes {
        min-height: 220px;
        max-height: 300px;
        overflow: auto;
        padding-right: 6px;
        border-radius: 0;
        background: transparent;
        border: 0;
        color: var(--text-soft);
        font-family: 'SF Mono', SFMono-Regular, ui-monospace, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.56;
        white-space: pre-wrap;
        word-break: break-word;
        user-select: text;
        -webkit-user-select: text;
        -webkit-app-region: no-drag;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding-top: 14px;
        border-top: 1px solid var(--notes-divider);
        -webkit-app-region: no-drag;
      }

      .button {
        appearance: none;
        min-width: 88px;
        height: 32px;
        padding: 0 14px;
        border: 1px solid var(--btn-border);
        border-radius: 10px;
        background: var(--btn-bg);
        color: var(--btn-text);
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.005em;
        cursor: pointer;
        box-shadow: var(--btn-shadow);
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 80ms ease,
          box-shadow 120ms ease;
      }

      .button:hover {
        background: var(--btn-bg-hover);
        border-color: var(--btn-border-hover);
      }

      .button:active {
        transform: translateY(1px);
      }

      .button:focus-visible {
        outline: none;
        box-shadow: var(--btn-shadow), 0 0 0 3px var(--focus-ring);
      }

      .button.is-primary {
        background: var(--primary-bg);
        color: var(--primary-text);
        border-color: transparent;
        box-shadow: var(--primary-shadow);
      }

      .button.is-primary:hover {
        background: var(--primary-bg-hover);
        border-color: transparent;
      }

      .button.is-primary:focus-visible {
        box-shadow: var(--primary-shadow), 0 0 0 3px var(--focus-ring);
      }
    </style>
  </head>
  <body class="is-compact">
    <main class="panel">
      <section class="card">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="fd-bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1A2332" />
                <stop offset="1" stop-color="#0F1720" />
              </linearGradient>
            </defs>
            <rect width="1024" height="1024" rx="220" fill="url(#fd-bg)" />
            <rect x="338" y="40" width="1.5" height="944" fill="#2A3A4C" opacity="0.5" />
            <rect x="685" y="40" width="1.5" height="944" fill="#2A3A4C" opacity="0.5" />
            <path d="M100 360 L160 420 L100 480" stroke="#F0883E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <rect x="182" y="462" width="52" height="14" rx="7" fill="#F0883E" />
            <rect x="100" y="540" width="180" height="10" rx="5" fill="#F0883E" opacity="0.13" />
            <rect x="100" y="574" width="200" height="10" rx="5" fill="#F0883E" opacity="0.10" />
            <rect x="100" y="608" width="140" height="10" rx="5" fill="#F0883E" opacity="0.07" />
            <path d="M398 360 L458 420 L398 480" stroke="#56D4C4" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <rect x="480" y="462" width="52" height="14" rx="7" fill="#56D4C4" />
            <rect x="398" y="540" width="240" height="10" rx="5" fill="#56D4C4" opacity="0.13" />
            <rect x="398" y="574" width="170" height="10" rx="5" fill="#56D4C4" opacity="0.10" />
            <rect x="398" y="608" width="220" height="10" rx="5" fill="#56D4C4" opacity="0.07" />
            <rect x="398" y="642" width="160" height="10" rx="5" fill="#56D4C4" opacity="0.06" />
            <path d="M744 360 L804 420 L744 480" stroke="#A78BFA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            <rect x="826" y="462" width="52" height="14" rx="7" fill="#A78BFA" />
            <rect x="744" y="540" width="190" height="10" rx="5" fill="#A78BFA" opacity="0.13" />
            <rect x="744" y="574" width="150" height="10" rx="5" fill="#A78BFA" opacity="0.10" />
            <rect x="744" y="608" width="200" height="10" rx="5" fill="#A78BFA" opacity="0.07" />
          </svg>
        </div>
        <section class="content">
          <div class="meta">
            <span id="badge" class="badge hidden"></span>
          </div>
          <h1 id="title" class="title">Downloading update…</h1>
          <p id="detail" class="detail"></p>
          <div id="progress" class="progress">
            <div class="progress-track">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span id="progress-text" class="progress-text">0.0 / 0.0 MB</span>
          </div>
          <section id="notes-shell" class="notes-shell hidden">
            <div id="notes-label" class="notes-label">Changelog</div>
            <pre id="notes" class="notes"></pre>
          </section>
        </section>
      </section>

      <div class="actions">
        <button id="tertiary-button" class="button hidden" type="button">Skip This Version</button>
        <button id="secondary-button" class="button hidden" type="button">Later</button>
        <button id="primary-button" class="button is-primary" type="button">Cancel</button>
      </div>
    </main>

    <script>
      const bridge = window.flowdeck;
      if (!bridge) {
        throw new Error('flowdeck bridge not available');
      }

      const ACTION_CANCEL = 'cancel';
      const ACTION_RESTART = 'restart';
      const ACTION_CLOSE = 'close';
      const ACTION_DOWNLOAD = 'download';
      const ACTION_OPEN_RELEASE = 'open-release';
      const ACTION_SKIP_VERSION = 'skip-version';

      const VALID_ACTIONS = new Set([
        ACTION_CANCEL,
        ACTION_RESTART,
        ACTION_CLOSE,
        ACTION_DOWNLOAD,
        ACTION_OPEN_RELEASE,
        ACTION_SKIP_VERSION,
      ]);

      const state = {
        title: 'Downloading update…',
        detail: '',
        downloadedBytes: 0,
        totalBytes: 1,
        progress: 0,
        showProgress: true,
        primaryAction: ACTION_CANCEL,
        primaryLabel: 'Cancel',
        secondaryAction: null,
        secondaryLabel: '',
        tertiaryAction: null,
        tertiaryLabel: '',
        badge: '',
        notes: '',
        notesLabel: 'Changelog',
      };

      const els = {
        badge: document.getElementById('badge'),
        title: document.getElementById('title'),
        detail: document.getElementById('detail'),
        progress: document.getElementById('progress'),
        progressFill: document.getElementById('progress-fill'),
        progressText: document.getElementById('progress-text'),
        notesShell: document.getElementById('notes-shell'),
        notesLabel: document.getElementById('notes-label'),
        notes: document.getElementById('notes'),
        primaryButton: document.getElementById('primary-button'),
        secondaryButton: document.getElementById('secondary-button'),
        tertiaryButton: document.getElementById('tertiary-button'),
      };

      function clampProgress(value) {
        if (!Number.isFinite(value)) return 0;
        if (value < 0) return 0;
        if (value > 1) return 1;
        return value;
      }

      function normalizeBytes(value) {
        if (!Number.isFinite(value) || value <= 0) return 0;
        return Math.round(value);
      }

      function formatMegabytes(bytes) {
        return (bytes / (1024 * 1024)).toFixed(1);
      }

      function isAction(value) {
        return VALID_ACTIONS.has(value);
      }

      function applyPartialState(payload) {
        if (!payload || typeof payload !== 'object') return;

        if (typeof payload.title === 'string') state.title = payload.title;
        if (typeof payload.detail === 'string') state.detail = payload.detail;
        if (typeof payload.primaryLabel === 'string') state.primaryLabel = payload.primaryLabel;
        if (typeof payload.secondaryLabel === 'string') {
          state.secondaryLabel = payload.secondaryLabel;
        } else if (!payload.secondaryLabel) {
          state.secondaryLabel = '';
        }
        if (typeof payload.tertiaryLabel === 'string') {
          state.tertiaryLabel = payload.tertiaryLabel;
        } else if (!payload.tertiaryLabel) {
          state.tertiaryLabel = '';
        }
        if (typeof payload.badge === 'string') {
          state.badge = payload.badge;
        } else if (!payload.badge) {
          state.badge = '';
        }
        if (typeof payload.notes === 'string') {
          state.notes = payload.notes;
        } else if (!payload.notes) {
          state.notes = '';
        }
        if (typeof payload.notesLabel === 'string') {
          state.notesLabel = payload.notesLabel;
        } else if (!payload.notesLabel) {
          state.notesLabel = 'Changelog';
        }
        if (typeof payload.showProgress === 'boolean') state.showProgress = payload.showProgress;

        state.downloadedBytes = normalizeBytes(
          typeof payload.downloadedBytes === 'number' ? payload.downloadedBytes : state.downloadedBytes,
        );
        state.totalBytes = Math.max(
          normalizeBytes(typeof payload.totalBytes === 'number' ? payload.totalBytes : state.totalBytes),
          state.downloadedBytes,
          1,
        );

        state.progress = clampProgress(
          typeof payload.progress === 'number'
            ? payload.progress
            : state.downloadedBytes / state.totalBytes,
        );

        if (isAction(payload.primaryAction)) {
          state.primaryAction = payload.primaryAction;
        }
        state.secondaryAction = isAction(payload.secondaryAction) ? payload.secondaryAction : null;
        state.tertiaryAction = isAction(payload.tertiaryAction) ? payload.tertiaryAction : null;
      }

      function renderButton(el, label, action) {
        if (action && label) {
          el.textContent = label;
          el.dataset.action = action;
          el.classList.remove('hidden');
        } else {
          el.dataset.action = '';
          el.classList.add('hidden');
        }
      }

      function render() {
        document.body.classList.toggle('is-compact', !state.notes);
        els.title.textContent = state.title;

        if (state.badge) {
          els.badge.textContent = state.badge;
          els.badge.classList.remove('hidden');
        } else {
          els.badge.classList.add('hidden');
        }

        if (state.detail) {
          els.detail.textContent = state.detail;
          els.detail.classList.remove('is-hidden');
        } else {
          els.detail.textContent = '';
          els.detail.classList.add('is-hidden');
        }

        if (state.showProgress) {
          els.progress.classList.remove('is-hidden');
          els.progressFill.style.width = (state.progress * 100).toFixed(1) + '%';
          const total = Math.max(state.totalBytes, state.downloadedBytes);
          els.progressText.textContent =
            formatMegabytes(state.downloadedBytes) + ' / ' + formatMegabytes(total) + ' MB';
        } else {
          els.progress.classList.add('is-hidden');
        }

        if (state.notes) {
          els.notesShell.classList.remove('hidden');
          els.notesLabel.textContent = state.notesLabel || 'Changelog';
          els.notes.textContent = state.notes;
        } else {
          els.notesShell.classList.add('hidden');
          els.notes.textContent = '';
        }

        renderButton(els.tertiaryButton, state.tertiaryLabel, state.tertiaryAction);
        renderButton(els.secondaryButton, state.secondaryLabel, state.secondaryAction);
        renderButton(els.primaryButton, state.primaryLabel, state.primaryAction);
      }

      async function runAction(action) {
        if (!action) return;
        try {
          if (action === ACTION_CANCEL) {
            await bridge.cancelUpdateDownload();
            return;
          }
          if (action === ACTION_RESTART) {
            await bridge.restartForUpdate();
            return;
          }
          if (action === ACTION_CLOSE) {
            await bridge.closeUpdateWindow();
            return;
          }
          await bridge.runUpdateAction(action);
        } catch (err) {
          console.error('Update action failed:', err);
        }
      }

      for (const button of [els.primaryButton, els.secondaryButton, els.tertiaryButton]) {
        button.addEventListener('click', () => {
          runAction(button.dataset.action || '');
        });
      }

      const unsubscribe = bridge.onUpdateWindowState((payload) => {
        applyPartialState(payload);
        render();
      });

      window.addEventListener('beforeunload', () => {
        if (typeof unsubscribe === 'function') {
          unsubscribe();
        }
      });

      render();
    </script>
  </body>
</html>

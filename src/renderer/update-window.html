<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Updating FlowDeck</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ececec;
        --text: #1d1d1f;
        --text-soft: #3a3a3c;
        --muted: #6e6e73;
        --track: rgba(0, 0, 0, 0.10);
        --fill-a: #0071e3;
        --fill-b: #3395ff;
        --btn-bg: rgba(255, 255, 255, 0.78);
        --btn-bg-hover: #ffffff;
        --btn-border: rgba(0, 0, 0, 0.14);
        --btn-border-hover: rgba(0, 0, 0, 0.22);
        --btn-shadow: 0 1px 0 rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.08);
        --btn-text: #1d1d1f;
        --primary-bg: #0071e3;
        --primary-bg-hover: #1488ff;
        --primary-text: #ffffff;
        --primary-shadow: 0 1px 2px rgba(0, 70, 180, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        --icon-shadow: 0 2px 6px rgba(0, 0, 0, 0.18), 0 0 0 0.5px rgba(0, 0, 0, 0.08);
        --focus-ring: rgba(0, 113, 227, 0.35);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1e1e1e;
          --text: #f5f5f7;
          --text-soft: #d1d1d6;
          --muted: #8e8e93;
          --track: rgba(255, 255, 255, 0.14);
          --fill-a: #0a84ff;
          --fill-b: #5ac8fa;
          --btn-bg: rgba(255, 255, 255, 0.10);
          --btn-bg-hover: rgba(255, 255, 255, 0.16);
          --btn-border: rgba(255, 255, 255, 0.14);
          --btn-border-hover: rgba(255, 255, 255, 0.22);
          --btn-shadow: 0 1px 0 rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.06);
          --btn-text: #f5f5f7;
          --primary-bg: #0a84ff;
          --primary-bg-hover: #2494ff;
          --primary-shadow: 0 1px 2px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.22);
          --icon-shadow: 0 2px 8px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.08);
          --focus-ring: rgba(10, 132, 255, 0.5);
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
        font-size: 13px;
        line-height: 1.42;
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: grid;
        align-content: center;
        row-gap: 14px;
        padding: 24px 24px 18px;
        -webkit-app-region: drag;
        user-select: none;
      }

      .layout {
        display: grid;
        grid-template-columns: 60px minmax(0, 1fr);
        column-gap: 16px;
        align-items: center;
      }

      .icon {
        width: 60px;
        height: 60px;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: var(--icon-shadow);
      }

      .icon svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 60px;
        justify-content: center;
      }

      .title {
        font-size: 15px;
        line-height: 1.22;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--text);
      }

      .progress {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        column-gap: 10px;
        margin-top: 2px;
      }

      .progress.is-hidden {
        display: none;
      }

      .progress-track {
        width: 100%;
        height: 6px;
        border-radius: 999px;
        background: var(--track);
        overflow: hidden;
      }

      .progress-fill {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--fill-a) 0%, var(--fill-b) 100%);
        transition: width 160ms ease;
      }

      .progress-text {
        font-size: 11px;
        line-height: 1;
        color: var(--muted);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .detail {
        font-size: 12px;
        line-height: 1.38;
        color: var(--text-soft);
        letter-spacing: -0.005em;
      }

      .detail.is-hidden {
        visibility: hidden;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      .button {
        appearance: none;
        min-width: 84px;
        height: 28px;
        padding: 0 14px;
        border: 1px solid var(--btn-border);
        border-radius: 7px;
        background: var(--btn-bg);
        color: var(--btn-text);
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.005em;
        cursor: pointer;
        box-shadow: var(--btn-shadow);
        transition:
          background 120ms ease,
          border-color 120ms ease,
          transform 80ms ease;
      }

      .button:hover {
        background: var(--btn-bg-hover);
        border-color: var(--btn-border-hover);
      }

      .button:active {
        transform: translateY(1px);
      }

      .button:focus-visible {
        outline: none;
        box-shadow:
          var(--btn-shadow),
          0 0 0 3px var(--focus-ring);
      }

      .button.is-primary {
        background: var(--primary-bg);
        color: var(--primary-text);
        border-color: transparent;
        box-shadow: var(--primary-shadow);
      }

      .button.is-primary:hover {
        background: var(--primary-bg-hover);
        border-color: transparent;
      }

      .button.is-primary:focus-visible {
        box-shadow:
          var(--primary-shadow),
          0 0 0 3px var(--focus-ring);
      }

      .button.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="layout">
      <div class="icon" aria-hidden="true">
        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="fd-bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1A2332" />
              <stop offset="1" stop-color="#0F1720" />
            </linearGradient>
          </defs>
          <rect width="1024" height="1024" rx="220" fill="url(#fd-bg)" />
          <rect x="338" y="40" width="1.5" height="944" fill="#2A3A4C" opacity="0.5" />
          <rect x="685" y="40" width="1.5" height="944" fill="#2A3A4C" opacity="0.5" />
          <path d="M100 360 L160 420 L100 480" stroke="#F0883E" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <rect x="182" y="462" width="52" height="14" rx="7" fill="#F0883E" />
          <rect x="100" y="540" width="180" height="10" rx="5" fill="#F0883E" opacity="0.13" />
          <rect x="100" y="574" width="200" height="10" rx="5" fill="#F0883E" opacity="0.10" />
          <rect x="100" y="608" width="140" height="10" rx="5" fill="#F0883E" opacity="0.07" />
          <path d="M398 360 L458 420 L398 480" stroke="#56D4C4" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <rect x="480" y="462" width="52" height="14" rx="7" fill="#56D4C4" />
          <rect x="398" y="540" width="240" height="10" rx="5" fill="#56D4C4" opacity="0.13" />
          <rect x="398" y="574" width="170" height="10" rx="5" fill="#56D4C4" opacity="0.10" />
          <rect x="398" y="608" width="220" height="10" rx="5" fill="#56D4C4" opacity="0.07" />
          <rect x="398" y="642" width="160" height="10" rx="5" fill="#56D4C4" opacity="0.06" />
          <path d="M744 360 L804 420 L744 480" stroke="#A78BFA" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <rect x="826" y="462" width="52" height="14" rx="7" fill="#A78BFA" />
          <rect x="744" y="540" width="190" height="10" rx="5" fill="#A78BFA" opacity="0.13" />
          <rect x="744" y="574" width="150" height="10" rx="5" fill="#A78BFA" opacity="0.10" />
          <rect x="744" y="608" width="200" height="10" rx="5" fill="#A78BFA" opacity="0.07" />
        </svg>
      </div>
      <section class="content">
        <h1 id="title" class="title">Downloading update…</h1>
        <div id="progress" class="progress">
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span id="progress-text" class="progress-text">0.0 / 0.0 MB</span>
        </div>
        <p id="detail" class="detail"></p>
      </section>
    </main>

    <div class="actions">
      <button id="secondary-button" class="button hidden" type="button">Later</button>
      <button id="primary-button" class="button is-primary" type="button">Cancel</button>
    </div>

    <script>
      const bridge = window.flowdeck;
      if (!bridge) {
        throw new Error('flowdeck bridge not available');
      }

      const ACTION_CANCEL = 'cancel';
      const ACTION_RESTART = 'restart';
      const ACTION_CLOSE = 'close';

      const state = {
        title: 'Downloading update…',
        detail: '',
        downloadedBytes: 0,
        totalBytes: 1,
        progress: 0,
        showProgress: true,
        primaryAction: ACTION_CANCEL,
        primaryLabel: 'Cancel',
        secondaryAction: null,
        secondaryLabel: '',
      };

      const els = {
        title: document.getElementById('title'),
        detail: document.getElementById('detail'),
        progress: document.getElementById('progress'),
        progressFill: document.getElementById('progress-fill'),
        progressText: document.getElementById('progress-text'),
        primaryButton: document.getElementById('primary-button'),
        secondaryButton: document.getElementById('secondary-button'),
      };

      function clampProgress(value) {
        if (!Number.isFinite(value)) return 0;
        if (value < 0) return 0;
        if (value > 1) return 1;
        return value;
      }

      function normalizeBytes(value) {
        if (!Number.isFinite(value) || value <= 0) return 0;
        return Math.round(value);
      }

      function formatMegabytes(bytes) {
        const mb = bytes / (1024 * 1024);
        return mb.toFixed(1);
      }

      function isAction(value) {
        return value === ACTION_CANCEL || value === ACTION_RESTART || value === ACTION_CLOSE;
      }

      function applyPartialState(payload) {
        if (!payload || typeof payload !== 'object') return;

        if (typeof payload.title === 'string') state.title = payload.title;
        if (typeof payload.detail === 'string') state.detail = payload.detail;
        if (typeof payload.primaryLabel === 'string') state.primaryLabel = payload.primaryLabel;
        if (typeof payload.secondaryLabel === 'string') {
          state.secondaryLabel = payload.secondaryLabel;
        } else if (!payload.secondaryLabel) {
          state.secondaryLabel = '';
        }

        if (typeof payload.showProgress === 'boolean') state.showProgress = payload.showProgress;

        state.downloadedBytes = normalizeBytes(
          typeof payload.downloadedBytes === 'number' ? payload.downloadedBytes : state.downloadedBytes,
        );
        state.totalBytes = Math.max(
          normalizeBytes(typeof payload.totalBytes === 'number' ? payload.totalBytes : state.totalBytes),
          state.downloadedBytes,
          1,
        );

        state.progress = clampProgress(
          typeof payload.progress === 'number'
            ? payload.progress
            : state.downloadedBytes / state.totalBytes,
        );

        if (isAction(payload.primaryAction)) {
          state.primaryAction = payload.primaryAction;
        }

        if (isAction(payload.secondaryAction)) {
          state.secondaryAction = payload.secondaryAction;
        } else {
          state.secondaryAction = null;
        }
      }

      function render() {
        els.title.textContent = state.title;
        els.detail.textContent = state.detail;

        if (state.detail) {
          els.detail.classList.remove('is-hidden');
        } else {
          els.detail.classList.add('is-hidden');
        }

        if (state.showProgress) {
          els.progress.classList.remove('is-hidden');
          els.progressFill.style.width = (state.progress * 100).toFixed(1) + '%';
          const total = Math.max(state.totalBytes, state.downloadedBytes);
          els.progressText.textContent =
            formatMegabytes(state.downloadedBytes) + ' / ' + formatMegabytes(total) + ' MB';
        } else {
          els.progress.classList.add('is-hidden');
        }

        els.primaryButton.textContent = state.primaryLabel;

        if (state.secondaryAction && state.secondaryLabel) {
          els.secondaryButton.textContent = state.secondaryLabel;
          els.secondaryButton.classList.remove('hidden');
        } else {
          els.secondaryButton.classList.add('hidden');
        }
      }

      async function runAction(action) {
        if (!action) return;
        try {
          if (action === ACTION_CANCEL) {
            await bridge.cancelUpdateDownload();
            return;
          }
          if (action === ACTION_RESTART) {
            await bridge.restartForUpdate();
            return;
          }
          await bridge.closeUpdateWindow();
        } catch (err) {
          console.error('Update action failed:', err);
        }
      }

      els.primaryButton.addEventListener('click', () => {
        runAction(state.primaryAction);
      });

      els.secondaryButton.addEventListener('click', () => {
        runAction(state.secondaryAction);
      });

      const unsubscribe = bridge.onUpdateWindowState((payload) => {
        applyPartialState(payload);
        render();
      });

      window.addEventListener('beforeunload', () => {
        if (typeof unsubscribe === 'function') {
          unsubscribe();
        }
      });

      render();
    </script>
  </body>
</html>
